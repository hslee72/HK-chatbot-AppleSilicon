services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  app:
    image: 541974874550.dkr.ecr.ap-northeast-2.amazonaws.com/hk-chatbot2:latest
    ports:
      - "8000:8000"
    volumes:
      - tenants_data:/app/tenants_store
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - QDRANT_URL=http://qdrant
      - QDRANT_PORT=6333
      - S3_DATA_BUCKET=hk-chatbot2-data-541974874550
      - AWS_REGION=ap-northeast-2
      - LLM_MODEL=nemotron-3-super:cloud
      - EMBED_MODEL=intfloat/multilingual-e5-small
      - OCR_ENABLED=true
      - VLM_ENABLED=false
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
  tenants_data:
